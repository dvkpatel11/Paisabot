{% extends "base.html" %}
{% block title %}Factors - Paisabot{% endblock %}

{% block content %}
<div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
  <h1>Factor & Signal Explorer</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn" id="btn-compute" onclick="triggerCompute()">Compute Factors</button>
    <span class="text-muted" id="compute-status" style="font-size:12px"></span>
  </div>
</div>

<!-- Signal Ranking -->
<div class="grid grid-3">
  <div class="panel panel-full">
    <div class="panel-header"><h2 class="text-green">LONG</h2></div>
    <div id="long-signals"></div>
  </div>
  <div class="panel panel-full">
    <div class="panel-header"><h2 class="text-yellow">NEUTRAL</h2></div>
    <div id="neutral-signals"></div>
  </div>
  <div class="panel panel-full">
    <div class="panel-header"><h2 class="text-red">AVOID</h2></div>
    <div id="avoid-signals"></div>
  </div>
</div>

<!-- Factor Heatmap -->
<div class="panel panel-full">
  <div class="panel-header">
    <h2>Factor Scores Heatmap</h2>
  </div>
  <div id="heatmap-chart" style="height:400px"></div>
</div>

<!-- Per-Symbol Factor History -->
<div class="panel panel-full">
  <div class="panel-header">
    <h2>Factor History</h2>
    <select id="factor-symbol-select" class="select-input">
      <option value="">Select ETF...</option>
    </select>
  </div>
  <div id="factor-history-chart" style="height:350px"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const signalCols = [
    {title: 'Symbol', field: 'symbol', width: 80},
    {title: 'Score', field: 'composite_score', formatter: PaisaTables.scoreFormatter},
    {title: 'Regime', field: 'regime'},
  ];

  PaisaTables.create('long-signals', signalCols);
  PaisaTables.create('neutral-signals', signalCols);
  PaisaTables.create('avoid-signals', signalCols);

  // Load signals
  fetch('/api/signals').then(r => r.json()).then(data => {
    PaisaTables.setData('long-signals', data.long || []);
    PaisaTables.setData('neutral-signals', data.neutral || []);
    PaisaTables.setData('avoid-signals', data.avoid || []);
  });

  // Populate symbol dropdown from universe (always has data)
  fetch('/api/universe').then(r => r.json()).then(etfs => {
    const select = document.getElementById('factor-symbol-select');
    etfs.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.symbol;
      opt.textContent = e.symbol + ' — ' + e.name;
      select.appendChild(opt);
    });
  });

  // Load scores for heatmap
  fetch('/api/scores').then(r => r.json()).then(scores => {
    const symbols = Object.keys(scores).sort();
    const factors = ['trend', 'volatility', 'sentiment', 'breadth', 'dispersion', 'correlation', 'liquidity', 'slippage'];

    if (symbols.length === 0) {
      document.getElementById('heatmap-chart').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:14px">' +
        'No factor scores yet. Click <strong>Compute Factors</strong> above (requires bar data from Pipelines).' +
        '</div>';
      return;
    }

    // Build heatmap
    const z = factors.map(f => symbols.map(s => scores[s] ? scores[s][f] || 0 : 0));

    PaisaCharts.heatmap('heatmap-chart', {
      z: z,
      x: symbols,
      y: factors,
      title: 'Factor Scores (0-1)',
    });
  });

  // Symbol history chart
  document.getElementById('factor-symbol-select').addEventListener('change', function() {
    const sym = this.value;
    if (!sym) return;

    fetch('/api/factors/' + sym + '?days=60').then(r => r.json()).then(data => {
      const factors = data.factors;
      const traces = ['trend', 'volatility', 'sentiment', 'breadth'].map(f => ({
        x: factors.dates,
        y: factors[f],
        name: f,
        type: 'scatter',
        mode: 'lines',
      }));

      PaisaCharts.timeSeries('factor-history-chart', traces, sym + ' Factor History');
    });
  });

  PaisaSocket.on('factor_scores', function(data) {
    // Refresh heatmap on new scores
    fetch('/api/scores').then(r => r.json()).then(scores => {
      const symbols = Object.keys(scores).sort();
      const factors = ['trend', 'volatility', 'sentiment', 'breadth', 'dispersion', 'correlation', 'liquidity', 'slippage'];
      const z = factors.map(f => symbols.map(s => scores[s] ? scores[s][f] || 0 : 0));
      PaisaCharts.heatmap('heatmap-chart', {z, x: symbols, y: factors, title: 'Factor Scores (0-1)'});
    });
  });

  // Live signal panel updates — re-classify into Long/Neutral/Avoid without a page reload
  PaisaSocket.on('signals', function(data) {
    // data is either {long:[], neutral:[], avoid:[]} or a flat {symbol: {signal_type, ...}} dict
    if (data.long !== undefined) {
      PaisaTables.setData('long-signals',    data.long    || []);
      PaisaTables.setData('neutral-signals', data.neutral || []);
      PaisaTables.setData('avoid-signals',   data.avoid   || []);
    } else {
      // Flat dict from publisher — sort client-side
      const long = [], neutral = [], avoid = [];
      Object.entries(data).forEach(([sym, s]) => {
        const row = {symbol: sym, composite_score: s.composite_score, regime: s.regime};
        if (s.signal_type === 'long')         long.push(row);
        else if (s.signal_type === 'avoid')   avoid.push(row);
        else                                  neutral.push(row);
      });
      PaisaTables.setData('long-signals',    long);
      PaisaTables.setData('neutral-signals', neutral);
      PaisaTables.setData('avoid-signals',   avoid);
    }
  });
});

function triggerCompute() {
  const btn = document.getElementById('btn-compute');
  const status = document.getElementById('compute-status');
  btn.disabled = true;
  btn.textContent = 'Computing...';
  status.textContent = 'Computing factors and signals...';

  fetch('/api/data/compute', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({sync: true}),
  })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        status.textContent = 'Error: ' + data.error;
      } else {
        status.textContent = 'Complete — ' + (data.symbols || 0) + ' symbols, ' + (data.signals || 0) + ' signals. Refreshing...';
        setTimeout(() => location.reload(), 2000);
      }
      btn.disabled = false;
      btn.textContent = 'Compute Factors';
    })
    .catch(() => {
      status.textContent = 'Computation failed — check server logs';
      btn.disabled = false;
      btn.textContent = 'Compute Factors';
    });
}
</script>
{% endblock %}
