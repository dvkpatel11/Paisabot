<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Paisabot{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2/dist/css/tabulator_midnight.min.css" rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

  {% block head %}{% endblock %}
</head>
<body>
  <!-- Navigation -->
  <nav class="nav-bar">
    <div class="nav-brand">
      <span class="nav-logo">P</span>
      <span class="nav-title">Paisabot</span>
      <span class="nav-mode" id="nav-mode">--</span>
    </div>
    <div class="nav-links">
      <a href="{{ url_for('views.dashboard') }}" class="nav-link {% if request.endpoint == 'views.dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{{ url_for('views.bulletin') }}" class="nav-link {% if request.endpoint == 'views.bulletin' %}active{% endif %}">Bulletin</a>
      <a href="{{ url_for('views.execution') }}" class="nav-link {% if request.endpoint == 'views.execution' %}active{% endif %}">Execution</a>
      <a href="{{ url_for('views.factors') }}" class="nav-link {% if request.endpoint == 'views.factors' %}active{% endif %}">Factors</a>
      <a href="{{ url_for('views.rotation') }}" class="nav-link {% if request.endpoint == 'views.rotation' %}active{% endif %}">Rotation</a>
      <a href="{{ url_for('views.portfolio') }}" class="nav-link {% if request.endpoint == 'views.portfolio' %}active{% endif %}">Portfolio</a>
      <a href="{{ url_for('views.pipelines') }}" class="nav-link {% if request.endpoint == 'views.pipelines' %}active{% endif %}">Pipelines</a>
      <a href="{{ url_for('views.config') }}" class="nav-link {% if request.endpoint == 'views.config' %}active{% endif %}">Config</a>
      <a href="{{ url_for('views.alerts') }}" class="nav-link {% if request.endpoint == 'views.alerts' %}active{% endif %}">
        Alerts
        <span class="badge badge-danger" id="alert-count" style="display:none">0</span>
      </a>
    </div>
    <div class="nav-status">
      <span class="status-dot" id="ws-status" title="WebSocket"></span>
      <span class="nav-time" id="nav-clock">--:--:--</span>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Vendor JS -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2/dist/js/tabulator.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14/dist/cdn.min.js"></script>

  <!-- App JS -->
  <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/tables.js') }}"></script>
  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>

  <script>
    // Clock
    setInterval(() => {
      const now = new Date();
      document.getElementById('nav-clock').textContent = now.toLocaleTimeString('en-US', {hour12: false});
    }, 1000);
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
