<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Paisabot{% endblock %}</title>

  <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- ── Icons ─────────────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />

  <!-- ── Charting ──────────────────────────────────────────────────────── -->
  <!-- Lightweight Charts (TradingView) — candlesticks, sparklines, area -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <!-- Plotly.js — heatmaps, correlation matrices, factor radar, PnL curves -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
  <!-- Chart.js — simple bar / doughnut / mini charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- ── Tables ────────────────────────────────────────────────────────── -->
  <!-- Tabulator — sortable / filterable real-time data tables -->
  <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

  <!-- ── Reactivity ────────────────────────────────────────────────────── -->
  <!-- Alpine.js — lightweight reactive bindings (no build step) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>

  <!-- ── Real-time ─────────────────────────────────────────────────────── -->
  <!-- Socket.IO client — Flask-SocketIO bridge -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js" crossorigin="anonymous"></script>

  <!-- ── Number formatting ─────────────────────────────────────────────── -->
  <!-- Numeral.js — currency, bps, pct formatting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/numeral.js/2.0.6/numeral.min.js"></script>

  <!-- ── Date/time ─────────────────────────────────────────────────────── -->
  <!-- Day.js — lightweight date parsing / display -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/plugin/relativeTime.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/plugin/utc.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/plugin/timezone.min.js"></script>

  <!-- ── Toast notifications ───────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css" />

  <!-- ── App styles ────────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/charts.css') }}" />
  {% block extra_css %}{% endblock %}
</head>

<body x-data x-init="$store.app.init()" class="app-body">

  <!-- ── Kill-switch banner (shown when kill switch is active) ─────────── -->
  <div id="kill-banner"
       class="kill-banner"
       x-data
       x-show="$store.app.killSwitchActive"
       x-transition
       style="display:none">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span x-text="$store.app.killSwitchMsg">TRADING HALTED</span>
    <a href="/config#kill-switches" class="kill-banner-link">Manage →</a>
  </div>

  <!-- ── Top nav bar ───────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="/" class="brand">
        <span class="brand-icon">₿</span>
        <span class="brand-name">Paisabot</span>
      </a>

      <!-- Market clock -->
      <div class="market-clock" id="market-clock">
        <span class="clock-time" id="clock-time">--:--:-- ET</span>
        <span class="clock-status" id="clock-status">--</span>
      </div>
    </div>

    <div class="topbar-center">
      <!-- Live regime pill -->
      <div class="regime-pill" x-data :class="'regime-' + $store.app.regime">
        <span class="regime-dot"></span>
        <span x-text="$store.app.regimeLabel">--</span>
        <span class="regime-conf" x-text="$store.app.regimeConf">--%</span>
      </div>

      <!-- Operational mode badge -->
      <div class="mode-badge" x-data :class="'mode-' + $store.app.mode">
        <i class="fa-solid fa-circle-dot"></i>
        <span x-text="$store.app.mode.toUpperCase()">--</span>
      </div>
    </div>

    <div class="topbar-right">
      <!-- System health micro-indicators (D F S P R E M) -->
      <div class="health-strip" x-data>
        <template x-for="(status, key) in $store.app.health" :key="key">
          <div class="health-dot"
               :class="status"
               :title="key + ': ' + status"
               x-text="key[0].toUpperCase()">
          </div>
        </template>
      </div>

      <!-- Alert bell -->
      <button class="icon-btn" id="alert-btn" x-data @click="$store.alerts.togglePanel()">
        <i class="fa-solid fa-bell"></i>
        <span class="alert-badge" x-show="$store.alerts.unread > 0" x-text="$store.alerts.unread"></span>
      </button>

      <!-- Settings link -->
      <a href="/config" class="icon-btn" title="Configuration">
        <i class="fa-solid fa-sliders"></i>
      </a>
    </div>
  </header>

  <!-- ── Main layout: sidebar + content ────────────────────────────────── -->
  <div class="app-shell">

    <!-- Side nav -->
    <nav class="sidebar" id="sidebar">
      <div class="nav-section-label">TRADING</div>
      <a href="/dashboard"  class="nav-item {% if request.endpoint == 'views.dashboard'  %}active{% endif %}">
        <i class="fa-solid fa-chart-line"></i><span>Dashboard</span>
        <span class="nav-badge" id="nav-pnl"></span>
      </a>
      <a href="/factors"    class="nav-item {% if request.endpoint == 'views.factors'    %}active{% endif %}">
        <i class="fa-solid fa-layer-group"></i><span>Factors</span>
      </a>
      <a href="/rotation"   class="nav-item {% if request.endpoint == 'views.rotation'   %}active{% endif %}">
        <i class="fa-solid fa-rotate"></i><span>Rotation</span>
      </a>
      <a href="/execution"  class="nav-item {% if request.endpoint == 'views.execution'  %}active{% endif %}">
        <i class="fa-solid fa-bolt"></i><span>Execution</span>
      </a>

      <div class="nav-section-label">ANALYSIS</div>
      <a href="/analytics"  class="nav-item {% if request.endpoint == 'views.analytics'  %}active{% endif %}">
        <i class="fa-solid fa-chart-bar"></i><span>Analytics</span>
      </a>
      <a href="/backtest"   class="nav-item {% if request.endpoint == 'views.backtest'   %}active{% endif %}">
        <i class="fa-solid fa-flask"></i><span>Backtest</span>
      </a>

      <div class="nav-section-label">SYSTEM</div>
      <a href="/alerts"     class="nav-item {% if request.endpoint == 'views.alerts'     %}active{% endif %}">
        <i class="fa-solid fa-triangle-exclamation"></i><span>Alerts</span>
        <span class="nav-badge danger" x-data x-show="$store.alerts.unread > 0" x-text="$store.alerts.unread"></span>
      </a>
      <a href="/pipelines"  class="nav-item {% if request.endpoint == 'views.pipelines'  %}active{% endif %}">
        <i class="fa-solid fa-network-wired"></i><span>Pipeline</span>
      </a>
      <a href="/config"     class="nav-item {% if request.endpoint == 'views.config'     %}active{% endif %}">
        <i class="fa-solid fa-gear"></i><span>Config</span>
      </a>
    </nav>

    <!-- Page content area -->
    <main class="content-area" id="main-content">
      {% block content %}{% endblock %}
    </main>

  </div><!-- /.app-shell -->

  <!-- ── Alert slide-over panel ────────────────────────────────────────── -->
  <div class="alert-panel" id="alert-panel" x-data x-show="$store.alerts.panelOpen" x-transition style="display:none">
    <div class="alert-panel-header">
      <span>Risk Alerts</span>
      <button @click="$store.alerts.togglePanel()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="alert-panel-body" id="alert-panel-body">
      <template x-for="alert in $store.alerts.items" :key="alert.id">
        <div class="alert-item" :class="'alert-' + alert.level">
          <div class="alert-type" x-text="alert.type"></div>
          <div class="alert-msg"  x-text="alert.message"></div>
          <div class="alert-time" x-text="alert.time"></div>
        </div>
      </template>
      <div x-show="$store.alerts.items.length === 0" class="alert-empty">No active alerts</div>
    </div>
  </div>

  <!-- ── Core app JS ────────────────────────────────────────────────────── -->
  <script src="{{ url_for('static', filename='js/stores.js') }}"></script>
  <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
  <script src="{{ url_for('static', filename='js/clock.js') }}"></script>
  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  {% block extra_js %}{% endblock %}

</body>
</html>
