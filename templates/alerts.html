{% extends "base.html" %}
{% block title %}Alerts - Paisabot{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Alerts & Notifications</h1>
</div>

<!-- Alert Filters -->
<div class="panel">
  <div class="filter-bar">
    <button class="btn btn-sm active" data-filter="all" onclick="filterAlerts('all', this)">All</button>
    <button class="btn btn-sm" data-filter="risk" onclick="filterAlerts('risk', this)">Risk</button>
    <button class="btn btn-sm" data-filter="regime" onclick="filterAlerts('regime', this)">Regime</button>
    <button class="btn btn-sm" data-filter="execution" onclick="filterAlerts('execution', this)">Execution</button>
    <button class="btn btn-sm" data-filter="system" onclick="filterAlerts('system', this)">System</button>
  </div>
</div>

<!-- Alert Feed -->
<div class="panel panel-full">
  <div class="panel-header">
    <h2>Alert Log</h2>
    <span class="badge" id="alert-total">0</span>
  </div>
  <div id="alert-feed" class="alert-feed"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const alertStore = [];

function addAlert(alert) {
  alertStore.unshift(alert);
  if (alertStore.length > 200) alertStore.pop();
  renderAlerts();
}

function renderAlerts(filter) {
  const feed = document.getElementById('alert-feed');
  const filtered = filter && filter !== 'all'
    ? alertStore.filter(a => a.type === filter)
    : alertStore;

  feed.innerHTML = filtered.map(a => {
    const cls = a.severity === 'critical' ? 'alert-critical' :
                a.severity === 'warning' ? 'alert-warning' : 'alert-info';
    return '<div class="alert-item ' + cls + '">' +
           '<span class="alert-time">' + PaisaUtils.formatTime(a.timestamp) + '</span>' +
           '<span class="alert-type badge badge-sm">' + (a.type || 'system') + '</span>' +
           '<span class="alert-message">' + (a.message || JSON.stringify(a)) + '</span>' +
           '</div>';
  }).join('');

  document.getElementById('alert-total').textContent = filtered.length;
}

function filterAlerts(type, btn) {
  document.querySelectorAll('.filter-bar .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAlerts(type);
}

document.addEventListener('DOMContentLoaded', function() {
  PaisaSocket.on('risk_alert', function(data) {
    data.severity = data.severity || 'warning';
    data.type = 'risk';
    data.message = data.action ? data.action + ': ' + (data.switch || data.symbol || '') : JSON.stringify(data);
    addAlert(data);
  });

  PaisaSocket.on('regime_change', function(data) {
    addAlert({
      type: 'regime',
      severity: 'info',
      message: 'Regime changed: ' + (data.from_regime || '?') + ' → ' + (data.to_regime || '?'),
      timestamp: data.timestamp,
    });
  });

  PaisaSocket.on('trade', function(data) {
    addAlert({
      type: 'execution',
      severity: 'info',
      message: data.side + ' ' + data.symbol + ' @ ' + (data.fill_price || '--'),
      timestamp: data.timestamp || data.fill_time,
    });
  });

  PaisaSocket.on('config_change', function(data) {
    addAlert({
      type: 'system',
      severity: 'info',
      message: data.category + '.' + data.key + ': ' + data.old_value + ' → ' + data.new_value,
      timestamp: data.timestamp,
    });
  });
});
</script>
{% endblock %}
