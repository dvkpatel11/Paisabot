# Local development infrastructure only — PostgreSQL + Redis.
# Flask and Celery run directly on the host via run_dev.sh.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml down

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paisabot
      POSTGRES_PASSWORD: paisabot
      POSTGRES_DB: paisabot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paisabot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
