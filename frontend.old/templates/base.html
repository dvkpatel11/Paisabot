<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Paisabot{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2/dist/css/tabulator_midnight.min.css" rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

  {% block head %}{% endblock %}
</head>
<body>
  <!-- Navigation -->
  <nav class="nav-bar">
    <div class="nav-brand">
      <span class="nav-logo">P</span>
      <span class="nav-title">Paisabot</span>
      <span class="nav-mode" id="nav-mode">--</span>
    </div>
    <div class="nav-links">
      <a href="{{ url_for('views.dashboard') }}" class="nav-link {% if request.endpoint == 'views.dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{{ url_for('views.bulletin') }}" class="nav-link {% if request.endpoint == 'views.bulletin' %}active{% endif %}">Bulletin</a>
      <a href="{{ url_for('views.execution') }}" class="nav-link {% if request.endpoint == 'views.execution' %}active{% endif %}">Execution</a>
      <a href="{{ url_for('views.factors') }}" class="nav-link {% if request.endpoint == 'views.factors' %}active{% endif %}">Factors</a>
      <a href="{{ url_for('views.rotation') }}" class="nav-link {% if request.endpoint == 'views.rotation' %}active{% endif %}">Rotation</a>
      <a href="{{ url_for('views.portfolio') }}" class="nav-link {% if request.endpoint == 'views.portfolio' %}active{% endif %}">Portfolio</a>
      <a href="{{ url_for('views.pipelines') }}" class="nav-link {% if request.endpoint == 'views.pipelines' %}active{% endif %}">Pipelines</a>
      <a href="{{ url_for('views.config') }}" class="nav-link {% if request.endpoint == 'views.config' %}active{% endif %}">Config</a>
      <a href="{{ url_for('views.alerts') }}" class="nav-link {% if request.endpoint == 'views.alerts' %}active{% endif %}">
        Alerts
        <span class="badge badge-danger" id="alert-count" style="display:none">0</span>
      </a>
    </div>
    <div class="nav-status">
      <span class="status-dot" id="ws-status" title="WebSocket"></span>
      <span class="nav-time" id="nav-clock">--:--:--</span>
    </div>
  </nav>

  <!-- System halted banner — shown on all pages when kill_switch:trading or kill_switch:all is set -->
  <div id="system-banner">
    TRADING HALTED
    <span class="banner-detail" id="banner-detail"></span>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Vendor JS -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2/dist/js/tabulator.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14/dist/cdn.min.js"></script>

  <!-- App JS -->
  <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/tables.js') }}"></script>
  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>

  <script>
    // Clock
    setInterval(() => {
      const now = new Date();
      document.getElementById('nav-clock').textContent = now.toLocaleTimeString('en-US', {hour12: false});
    }, 1000);

    // Nav alert badge — increments on any risk_alert event, cleared when visiting /alerts
    (function() {
      let _alertCount = 0;
      const badge = document.getElementById('alert-count');

      document.addEventListener('DOMContentLoaded', function() {
        PaisaSocket.on('risk_alert', function() {
          _alertCount++;
          badge.textContent = _alertCount;
          badge.style.display = '';
        });

        // Clear badge when on the alerts page
        if (window.location.pathname === '/alerts') {
          _alertCount = 0;
          badge.style.display = 'none';
        }
      });
    })();
  </script>

  <!-- Toast container — rendered by PaisaUtils.toast() -->
  <div id="toast-container"></div>

  <!-- Global system status: mode badge + halted banner — runs on every page -->
  <script>
  (function() {
    var _lastFetch = 0;

    function updateSystemStatus(data) {
      var navMode = document.getElementById('nav-mode');
      var banner  = document.getElementById('system-banner');
      var detail  = document.getElementById('banner-detail');

      var ks      = data.kill_switches || {};
      var halted  = ks.trading || ks.all || ks.force_liquidate;
      var mode    = (data.operational_mode || 'simulation').toLowerCase();

      if (navMode) {
        if (halted) {
          navMode.textContent = 'HALTED';
          navMode.className   = 'nav-mode mode-halted';
        } else {
          navMode.textContent = mode.toUpperCase();
          navMode.className   = 'nav-mode mode-' + mode;
        }
      }

      if (banner) {
        banner.style.display = halted ? '' : 'none';
        if (detail) {
          var active = Object.keys(ks).filter(function(k) { return ks[k]; });
          detail.textContent = active.length ? '— ' + active.join(', ') + ' switch active' : '';
        }
      }
    }

    function fetchStatus() {
      var now = Date.now();
      if (now - _lastFetch < 5000) return;   // debounce 5s
      _lastFetch = now;
      PaisaUtils.fetchJSON('/api/health')
        .then(updateSystemStatus)
        .catch(function() {});
    }

    document.addEventListener('DOMContentLoaded', function() {
      fetchStatus();

      // Re-evaluate whenever the server broadcasts health or config changes
      PaisaSocket.on('system_health', function(data) {
        // system_health may or may not carry kill_switch / mode; re-fetch to be safe
        fetchStatus();
      });

      PaisaSocket.on('config_change', function(data) {
        if (data && (data.category === 'system' || data.key === 'operational_mode')) {
          _lastFetch = 0;   // force a fresh fetch
          fetchStatus();
        }
      });

      // Kill-switch toggles broadcast as risk_alerts with type 'kill_switch'
      PaisaSocket.on('risk_alert', function(data) {
        if (data && data.type === 'kill_switch') {
          _lastFetch = 0;
          fetchStatus();
        }
      });
    });
  })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
