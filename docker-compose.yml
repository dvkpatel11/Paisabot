# Paisabot — Docker Compose
#
# Usage:
#   docker compose up -d                    # infra only (postgres + redis) for local dev
#   docker compose --profile app up -d      # full stack (postgres + redis + web + celery)
#   docker compose --profile app down       # stop everything

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paisabot
      POSTGRES_PASSWORD: paisabot
      POSTGRES_DB: paisabot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paisabot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    profiles: [app]
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_CONFIG: production
      DATABASE_URL: postgresql://paisabot:paisabot@postgres:5432/paisabot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    profiles: [app]
    build: .
    command: celery -A celery_worker worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      FLASK_CONFIG: production
      DATABASE_URL: postgresql://paisabot:paisabot@postgres:5432/paisabot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
